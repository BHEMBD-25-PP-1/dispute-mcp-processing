openapi: 3.0.3
info:
  title: Dispute Processing API
  version: 1.1.0
  description: |
    REST API кабинета операциониста для обработки диспутов НСПК.

    Базовый префикс: `/api/v1`.

    **Аутентификация:** для защищённых методов передавайте заголовок
    `Authorization: Bearer <JWT_TOKEN>`. Токен выдаётся через `POST /login`.

    **Идемпотентность:** `POST /disputes/process` поддерживает заголовок
    `Idempotency-Key` — повторный запрос с тем же ключом и телом вернёт
    сохранённый результат без повторной обработки.

    **Корреляция:** опциональный заголовок `X-Correlation-Id` связывает
    запросы с событиями в журнале `dispute_events` и публикациями в Kafka
    (после commit в БД).

servers:
  - url: http://localhost:8000/api/v1
    description: Локальная разработка
  - url: /api/v1
    description: Относительный URL (за reverse-proxy)

tags:
  - name: auth
    description: Аутентификация и учётная запись
  - name: admin
    description: Администрирование пользователей
  - name: disputes
    description: Обработка диспутов (персистентный workflow)
  - name: operator-cases
    description: Демо-кейсы рабочего места оператора

security:
  - BearerAuth: []

paths:
  /login:
    post:
      tags: [auth]
      summary: Аутентификация
      description: Получение JWT для доступа к защищённым методам API.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Успешная аутентификация
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /change-password:
    patch:
      tags: [auth]
      summary: Сменить пароль
      description: Пользователь меняет свой пароль (требуется текущий пароль).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '200':
          description: Пароль изменён
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /admin/users:
    get:
      tags: [admin]
      summary: Список пользователей
      description: Доступно только пользователям с ролью `ADMIN`.
      responses:
        '200':
          description: Список пользователей
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags: [admin]
      summary: Создать пользователя
      description: Доступно только пользователям с ролью `ADMIN`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreateRequest'
      responses:
        '201':
          description: Пользователь создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /disputes/process:
    post:
      tags: [disputes]
      summary: Обработать текст диспута
      description: |
        Принимает текст обращения, парсит идентификаторы, классифицирует сервис,
        запрашивает MCP и сохраняет результат в БД с append-only журналом событий.

        При повторе с тем же `Idempotency-Key` и тем же телом возвращается
        сохранённый ответ (`replayed: true`).
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DisputeProcessRequest'
      responses:
        '200':
          description: Диспут обработан или возвращён идемпотентный replay
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DisputeProcessResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /disputes/{dispute_id}/claim:
    post:
      tags: [disputes]
      summary: Захватить диспут оператором
      description: |
        Оптимистическая блокировка: клиент передаёт `expected_version`.
        При успехе диспут назначается текущему оператору на `lock_minutes` минут.
      parameters:
        - $ref: '#/components/parameters/DisputeId'
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DisputeClaimRequest'
      responses:
        '200':
          description: Диспут захвачен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DisputeStateResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/VersionConflict'
        '422':
          $ref: '#/components/responses/InvalidTransition'

  /disputes/{dispute_id}/status:
    patch:
      tags: [disputes]
      summary: Обновить статус диспута
      description: |
        Смена статуса с проверкой допустимых переходов и версии записи.
        Допустимые статусы: `accepted`, `processing`, `attention`, `resolved`.
      parameters:
        - $ref: '#/components/parameters/DisputeId'
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DisputeStatusUpdateRequest'
      responses:
        '200':
          description: Статус обновлён
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DisputeStateResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/VersionConflict'
        '422':
          $ref: '#/components/responses/InvalidTransition'

  /operator/cases:
    get:
      tags: [operator-cases]
      summary: Список демо-кейсов
      description: |
        Возвращает шаблоны кейсов для UI оператора (stateless-копии на бэкенде).
        Каждый вызов действий (`parse`, `mcp`, `result`) работает с копией шаблона.
      responses:
        '200':
          description: Список кейсов
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OperatorCase'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /operator/cases/{case_id}/parse:
    post:
      tags: [operator-cases]
      summary: Распарсить кейс
      parameters:
        - $ref: '#/components/parameters/CaseId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CaseActionRequest'
      responses:
        '200':
          description: Кейс с результатом парсинга
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperatorCase'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /operator/cases/{case_id}/mcp:
    post:
      tags: [operator-cases]
      summary: Запросить MCP по кейсу
      parameters:
        - $ref: '#/components/parameters/CaseId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CaseActionRequest'
      responses:
        '200':
          description: Кейс с обновлёнными коннекторами MCP
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperatorCase'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /operator/cases/{case_id}/result:
    post:
      tags: [operator-cases]
      summary: Сформировать итог по кейсу
      parameters:
        - $ref: '#/components/parameters/CaseId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CaseActionRequest'
      responses:
        '200':
          description: Кейс с сформированным ответом
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperatorCase'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [operator-cases]
      summary: Обновить итог кейса вручную
      parameters:
        - $ref: '#/components/parameters/CaseId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CaseResultUpdateRequest'
      responses:
        '200':
          description: Кейс с обновлённым итогом
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperatorCase'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    DisputeId:
      name: dispute_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Идентификатор диспута
    CaseId:
      name: case_id
      in: path
      required: true
      schema:
        type: string
      description: Идентификатор демо-кейса (например, `DSP-1042`)
      example: DSP-1042
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      schema:
        type: string
      description: Ключ идемпотентности для `POST /disputes/process`
    CorrelationId:
      name: X-Correlation-Id
      in: header
      required: false
      schema:
        type: string
        format: uuid
      description: Идентификатор корреляции для журнала событий

  responses:
    Unauthorized:
      description: Не авторизован — отсутствует или невалидный токен
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            detail:
              message: Invalid token
              code: AUTH_ERROR
    Forbidden:
      description: Недостаточно прав
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            detail:
              message: Forbidden
              code: FORBIDDEN_ERROR
    ValidationError:
      description: Ошибка валидации входных данных
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationErrorResponse'
    NotFound:
      description: Ресурс не найден
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            detail:
              message: Dispute not found
              code: NOT_FOUND
    VersionConflict:
      description: Конфликт версии или блокировки
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            detail:
              message: Version mismatch
              code: VERSION_CONFLICT
    InvalidTransition:
      description: Недопустимый переход статуса
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            detail:
              message: Invalid status transition
              code: INVALID_TRANSITION

  schemas:
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          example: operator
        password:
          type: string
          format: password
          example: operator123

    LoginResponse:
      type: object
      required: [access_token, token_type]
      properties:
        access_token:
          type: string
          description: JWT для Bearer-авторизации
        token_type:
          type: string
          example: bearer

    ChangePasswordRequest:
      type: object
      required: [old_password, new_password]
      properties:
        old_password:
          type: string
          format: password
        new_password:
          type: string
          format: password

    MessageResponse:
      type: object
      properties:
        message:
          type: string
          example: Password changed successfully

    UserRole:
      type: string
      enum: [ADMIN, OPERATOR]

    UserResponse:
      type: object
      required: [id, username, role, createdAt]
      properties:
        id:
          type: string
        username:
          type: string
        role:
          $ref: '#/components/schemas/UserRole'
        createdAt:
          type: string
          format: date-time

    UserCreateRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          example: operator1
        password:
          type: string
          format: password
        role:
          $ref: '#/components/schemas/UserRole'
          default: OPERATOR

    DisputeProcessRequest:
      type: object
      required: [text]
      properties:
        text:
          type: string
          description: Текст обращения / диспута от НСПК
          example: |
            От НСПК поступил диспут: transaction_id=TXN-98765, order_id=TAXI-240518.
            Клиент сообщает, что поездка не состоялась, но оплата списана.

    DisputeProcessResponse:
      type: object
      required: [status, parsed, nlu, mcp, result, replayed]
      properties:
        dispute_id:
          type: string
          format: uuid
          nullable: true
        idempotency_key:
          type: string
          nullable: true
        replayed:
          type: boolean
          description: true, если ответ возвращён из идемпотентного replay
        version:
          type: integer
          nullable: true
        assigned_to:
          type: string
          nullable: true
          description: ID оператора, если диспут назначен
        locked_until:
          type: string
          format: date-time
          nullable: true
        status:
          $ref: '#/components/schemas/DisputeWorkflowStatus'
        parsed:
          $ref: '#/components/schemas/ParsedDispute'
        nlu:
          $ref: '#/components/schemas/NluResult'
        mcp:
          $ref: '#/components/schemas/McpResult'
        result:
          type: string
          description: Итоговый текст ответа для оператора / НСПК

    DisputeClaimRequest:
      type: object
      required: [expected_version]
      properties:
        expected_version:
          type: integer
          minimum: 1
        lock_minutes:
          type: integer
          minimum: 1
          default: 15
          description: Длительность эксклюзивной блокировки в минутах

    DisputeStatusUpdateRequest:
      type: object
      required: [status, expected_version]
      properties:
        status:
          $ref: '#/components/schemas/DisputeWorkflowStatus'
        expected_version:
          type: integer
          minimum: 1

    DisputeStateResponse:
      type: object
      required: [dispute_id, status, version]
      properties:
        dispute_id:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/DisputeWorkflowStatus'
        version:
          type: integer
        assigned_to:
          type: string
          nullable: true
        locked_until:
          type: string
          format: date-time
          nullable: true

    DisputeWorkflowStatus:
      type: string
      description: |
        Статусы персистентного workflow:
        - `accepted` — принят в систему
        - `processing` — в обработке
        - `attention` — требует внимания оператора
        - `resolved` — завершён
      enum: [accepted, processing, attention, resolved]

    ParsedDispute:
      type: object
      additionalProperties: true
      description: Результат парсинга текста диспута
      properties:
        transaction_id:
          type: string
          nullable: true
          example: TXN-98765
        order_id:
          type: string
          nullable: true
          example: TAXI-240518
        user_id:
          type: string
          nullable: true
        service_hint:
          type: string
          nullable: true
          enum: [taxi, afisha, null]

    NluResult:
      type: object
      additionalProperties: true
      properties:
        service:
          type: string
          enum: [taxi, afisha, unknown]
        confidence:
          type: integer
          minimum: 0
          maximum: 100
        source:
          type: string
          description: Источник классификации (rules, llm, explicit_hint и т.д.)

    McpResult:
      type: object
      additionalProperties: true
      properties:
        status:
          type: string
          enum: [found, not_found, skipped]
        service:
          type: string
          nullable: true
        data:
          type: object
          additionalProperties: true
          nullable: true

    CaseActionRequest:
      type: object
      required: [message]
      properties:
        message:
          type: string
          description: Текст обращения для парсинга / MCP / генерации итога

    CaseResultUpdateRequest:
      type: object
      required: [result]
      properties:
        result:
          type: string
          description: Ручная правка итогового ответа оператором

    OperatorCase:
      type: object
      required:
        - id
        - title
        - partner
        - channel
        - priority
        - status
        - receivedAt
        - amount
        - customerName
        - message
        - identifiers
        - connectors
        - timeline
        - result
      properties:
        id:
          type: string
          example: DSP-1042
        title:
          type: string
        partner:
          type: string
          example: НСПК
        channel:
          type: string
          example: HTTP
        priority:
          type: string
          enum: [P1, P2, P3]
        status:
          $ref: '#/components/schemas/OperatorCaseStatus'
        receivedAt:
          type: string
          example: "09:41"
        amount:
          type: string
          example: "1 280 ₽"
        customerName:
          type: string
        message:
          type: string
        identifiers:
          $ref: '#/components/schemas/OperatorIdentifiers'
        connectors:
          type: array
          items:
            $ref: '#/components/schemas/McpConnector'
        timeline:
          type: array
          items:
            $ref: '#/components/schemas/TimelineEvent'
        result:
          type: string

    OperatorCaseStatus:
      type: string
      enum: [new, processing, attention, resolved]

    OperatorIdentifiers:
      type: object
      required: [service, confidence]
      properties:
        orderId:
          type: string
          nullable: true
        transactionId:
          type: string
          nullable: true
        userId:
          type: string
          nullable: true
        service:
          type: string
          enum: [taxi, afisha, unknown]
        confidence:
          type: integer
          minimum: 0
          maximum: 100

    McpConnector:
      type: object
      required: [id, name, service, status, sla, confidence, fields]
      properties:
        id:
          type: string
          enum: [taxi, afisha]
        name:
          type: string
        service:
          type: string
          enum: [taxi, afisha]
        status:
          type: string
          enum: [ready, queued, running, done, failed]
        sla:
          type: string
        confidence:
          type: integer
        fields:
          type: array
          items:
            $ref: '#/components/schemas/ConnectorField'

    ConnectorField:
      type: object
      required: [label, value]
      properties:
        label:
          type: string
        value:
          type: string

    TimelineEvent:
      type: object
      required: [id, title, detail, time, status]
      properties:
        id:
          type: string
        title:
          type: string
        detail:
          type: string
        time:
          type: string
        status:
          type: string
          enum: [info, success, warning]

    ErrorDetail:
      type: object
      required: [message, code]
      properties:
        message:
          type: string
        code:
          type: string

    ErrorResponse:
      type: object
      required: [detail]
      description: Стандартный формат ошибок FastAPI (HTTPException)
      properties:
        detail:
          $ref: '#/components/schemas/ErrorDetail'

    ValidationErrorDetail:
      allOf:
        - $ref: '#/components/schemas/ErrorDetail'
        - type: object
          properties:
            details:
              type: array
              items:
                type: object
                properties:
                  field:
                    type: string
                  msg:
                    type: string

    ValidationErrorResponse:
      type: object
      required: [detail]
      properties:
        detail:
          $ref: '#/components/schemas/ValidationErrorDetail'
