services:
  app:
    build:
      context: ..
      dockerfile: devops/Dockerfile
    container_name: dispute-app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://dispute:dispute@postgres:5432/dispute
      JWT_SECRET: ${JWT_SECRET:-local-dev-secret}
      EVENT_SIGNATURE_SECRET: ${EVENT_SIGNATURE_SECRET:-local-event-secret}
      SEED_OPERATOR_USERNAME: ${SEED_OPERATOR_USERNAME:-operator}
      SEED_OPERATOR_PASSWORD: ${SEED_OPERATOR_PASSWORD:-operator123}
      KAFKA_ENABLED: "true"
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_EVENTS_TOPIC: dispute-events
      LOG_LEVEL: INFO
      MCP_TAXI_URL: ${MCP_TAXI_URL:-http://host.docker.internal:9001}
      MCP_AFISHA_URL: ${MCP_AFISHA_URL:-http://host.docker.internal:9002}
      MCP_REQUEST_TIMEOUT: "10"
    volumes:
      - ../backend/app:/app/app
      - ../backend/tests:/app/tests
    depends_on:
      postgres:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  frontend:
    image: node:22-alpine
    container_name: dispute-frontend
    working_dir: /app
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api/v1
    volumes:
      - ../frontend:/app
      - frontend-node-modules:/app/node_modules
    depends_on:
      app:
        condition: service_started
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: dispute-postgres
    environment:
      POSTGRES_USER: dispute
      POSTGRES_PASSWORD: dispute
      POSTGRES_DB: dispute
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dispute -d dispute"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  kafka:
    image: apache/kafka:4.0.0
    container_name: dispute-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    restart: unless-stopped

  kafka-init:
    image: apache/kafka:4.0.0
    container_name: dispute-kafka-init
    depends_on:
      kafka:
        condition: service_started
    command: >
      bash -c "sleep 10 &&
      /opt/kafka/bin/kafka-topics.sh
      --bootstrap-server kafka:9092
      --create
      --if-not-exists
      --topic dispute-events
      --partitions 1
      --replication-factor 1"
    restart: "no"

  taxi-mock:
    build:
      context: ..
      dockerfile: devops/Dockerfile
    container_name: taxi-mock
    ports:
      - "9001:8000"
    volumes:
      - ../backend/mcp_servers:/app/mcp_servers
    environment:
      - PYTHONUNBUFFERED=1
    command: python mcp_servers/taxi_mock.py --transport=sse
    restart: unless-stopped

  afisha-mock:
    build:
      context: ..
      dockerfile: devops/Dockerfile
    container_name: afisha-mock
    ports:
      - "9002:8000"
    volumes:
      - ../backend/mcp_servers:/app/mcp_servers
    environment:
      - PYTHONUNBUFFERED=1
    command: python mcp_servers/afisha_mock.py --transport=sse
    restart: unless-stopped

volumes:
  postgres-data:
  frontend-node-modules: